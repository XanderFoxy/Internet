<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Internet Optimierung</title>
    <style>
        :root {
            --bg-color: #0a0e14;
            --card-bg: #161b22;
            --accent-blue: #58a6ff;
            --text-main: #adbac7;
            --transition-speed: 0.6s;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 100%; max-width: 450px; height: 100%; position: relative; perspective: 1000px; }
        .nav-menu { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); z-index: 100; display: flex; flex-direction: column; gap: 12px; }
        .nav-item { width: 45px; height: 45px; background: var(--card-bg); border: 1px solid var(--accent-blue); border-radius: 8px; display: flex; justify-content: center; align-items: center; color: var(--accent-blue); font-weight: bold; cursor: pointer; transition: all 0.3s var(--ease); }
        .nav-item.active { background: var(--accent-blue); color: var(--bg-color); transform: scale(1.1) translateX(5px); }
        .content-stack { width: 100%; height: 100%; position: relative; display: flex; justify-content: center; align-items: center; padding-left: 70px; padding-right: 20px; }
        .guide-card { position: absolute; width: calc(100% - 90px); aspect-ratio: 1 / 1; background: var(--card-bg); border-radius: 16px; overflow: hidden; opacity: 0; transform: rotateY(-30deg) translateX(100%) scale(0.8); transition: transform var(--transition-speed) var(--ease), opacity var(--transition-speed) var(--ease); pointer-events: none; }
        .guide-card.active { opacity: 1; transform: rotateY(0deg) translateX(0) scale(1); pointer-events: auto; z-index: 10; }
        .guide-card.prev { opacity: 0; transform: rotateY(30deg) translateX(-100%) scale(0.8); z-index: 1; }
        .guide-image { width: 100%; height: 100%; object-fit: cover; display: block; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-menu">
        <div class="nav-item active" onclick="showCard(1)">1</div>
        <div class="nav-item" onclick="showCard(2)">2</div>
        <div class="nav-item" onclick="showCard(3)">3</div>
        <div class="nav-item" onclick="showCard(4)">4</div>
        <div class="nav-item" onclick="showCard(5)">5</div>
    </div>
    <div class="content-stack">
        <div class="guide-card active" id="card-1"><img src="Bilder/IMG_4428.png" class="guide-image"></div>
        <div class="guide-card" id="card-2"><img src="Bilder/IMG_4424.png" class="guide-image"></div>
        <div class="guide-card" id="card-3"><img src="Bilder/IMG_4425.png" class="guide-image"></div>
        <div class="guide-card" id="card-4"><img src="Bilder/IMG_4426.png" class="guide-image"></div>
        <div class="guide-card" id="card-5"><img src="Bilder/IMG_4427.png" class="guide-image"></div>
    </div>
</div>
<script>
    let currentActive = 1;
    function showCard(id) {
        if (id === currentActive) return;
        document.querySelectorAll('.nav-item').forEach((item, i) => item.classList.toggle('active', i + 1 === id));
        document.querySelectorAll('.guide-card').forEach((card, i) => {
            card.classList.remove('active', 'prev');
            if (i + 1 === id) card.classList.add('active');
            else if (i + 1 === currentActive) card.classList.add('prev');
        });
        currentActive = id;
    }
</script>
</body>
</html>
